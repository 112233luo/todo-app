<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>📝 我的待办事项</h1>
      <p class="subtitle">随时记录，云端同步，永不丢失</p>
      <div class="sync-status synced" id="syncStatus">
        <span class="sync-dot"></span>
        <span id="syncText">已同步到云端</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">全部</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statActive">0</div>
        <div class="stat-label">待办</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statCompleted">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="input-wrapper">
        <input type="text" class="todo-input" id="todoInput" placeholder="添加新的待办事项..." maxlength="200">
        <button class="add-btn" id="addBtn">添加</button>
      </div>
      <div class="options-row">
        <select class="priority-select" id="prioritySelect">
          <option value="medium">优先级：中</option>
          <option value="high">优先级：高</option>
          <option value="low">优先级：低</option>
        </select>
        <select class="category-select" id="categorySelect">
          <option value="general">分类：一般</option>
          <option value="work">分类：工作</option>
          <option value="study">分类：学习</option>
          <option value="life">分类：生活</option>
          <option value="health">分类：健康</option>
        </select>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="active">待办</button>
      <button class="filter-tab" data-filter="completed">已完成</button>
    </div>

    <!-- Todo List -->
    <ul class="todo-list" id="todoList"></ul>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📋</div>
      <p>暂无待办事项，添加一个吧！</p>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>编辑待办事项</h3>
      <input type="text" class="modal-input" id="editInput" maxlength="200">
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelEdit">取消</button>
        <button class="modal-btn save" id="saveEdit">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== Data Layer =====
    const JSONBIN_API_KEY = '$2a$10$ZOvb.B/gphXQUXB6/vwIpOu.hmDg/1oTM6rohiF8Vij0irEPkJit.';
    const JSONBIN_BIN_ID = localStorage.getItem('jsonbin_bin_id') || null;
    let todos = [];
    let currentFilter = 'all';
    let editingId = null;
    let isLoading = false;

    // JSONBin.io API helpers
    async function createBin(data) {
      const res = await fetch('https://api.jsonbin.io/v3/b', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY,
          'X-Bin-Private': 'false'
        },
        body: JSON.stringify({ todos: data })
      });
      if (!res.ok) throw new Error('创建存储失败');
      const result = await res.json();
      return result.metadata.id;
    }

    async function updateBin(binId, data) {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ todos: data })
      });
      if (!res.ok) throw new Error('更新存储失败');
      return await res.json();
    }

    async function readBin(binId) {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
        method: 'GET',
        headers: {
          'X-Master-Key': JSONBIN_API_KEY
        }
      });
      if (!res.ok) throw new Error('读取存储失败');
      const result = await res.json();
      return result.record.todos || [];
    }

    // Load from JSONBin.io (real cloud)
    async function loadTodos() {
      isLoading = true;
      showSyncStatus('syncing');
      try {
        if (JSONBIN_BIN_ID) {
          todos = await readBin(JSONBIN_BIN_ID);
        } else {
          // Try to migrate from localStorage
          const local = localStorage.getItem('my_todo_app_data');
          const legacy = local ? JSON.parse(local) : [];
          todos = Array.isArray(legacy) ? legacy : [];
          if (todos.length > 0) {
            const binId = await createBin(todos);
            localStorage.setItem('jsonbin_bin_id', binId);
          }
        }
        showSyncStatus('synced');
      } catch (e) {
        console.error('云端加载失败:', e);
        // Fallback to localStorage
        const local = localStorage.getItem('my_todo_app_data');
        if (local) todos = JSON.parse(local);
        showSyncStatus('offline');
        showToast('云端同步失败，使用本地数据');
      }
      isLoading = false;
      renderTodos();
      updateStats();
    }

    // Save to JSONBin.io (real cloud sync)
    async function saveTodos() {
      if (isLoading) return;
      showSyncStatus('syncing');
      try {
        let binId = localStorage.getItem('jsonbin_bin_id');
        if (!binId) {
          binId = await createBin(todos);
          localStorage.setItem('jsonbin_bin_id', binId);
        } else {
          await updateBin(binId, todos);
        }
        // Also backup to localStorage
        localStorage.setItem('my_todo_app_data', JSON.stringify(todos));
        showSyncStatus('synced');
      } catch (e) {
        console.error('云端保存失败:', e);
        // Fallback to localStorage only
        localStorage.setItem('my_todo_app_data', JSON.stringify(todos));
        showSyncStatus('offline');
        showToast('云端同步失败，已保存到本地');
      }
      updateStats();
    }

    // Show sync status
    function showSyncStatus(status) {
      const el = document.getElementById('syncStatus');
      const text = document.getElementById('syncText');
      el.className = 'sync-status ' + status;
      const texts = {
        synced: '已同步到云端',
        syncing: '正在同步...',
        offline: '离线模式'
      };
      text.textContent = texts[status];
    }

    // ===== Todo Operations =====
    function addTodo(text, priority, category) {
      if (!text.trim()) return;
      const todo = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2),
        text: text.trim(),
        completed: false,
        priority: priority || 'medium',
        category: category || 'general',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      todos.unshift(todo);
      saveTodos();
      renderTodos();
      showToast('已添加待办事项');
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        todo.updatedAt = new Date().toISOString();
        saveTodos();
        renderTodos();
        showToast(todo.completed ? '已完成 ✓' : '已取消完成');
      }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      saveTodos();
      renderTodos();
      showToast('已删除');
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        editingId = id;
        document.getElementById('editInput').value = todo.text;
        document.getElementById('editModal').classList.add('active');
      }
    }

    function saveEdit() {
      const text = document.getElementById('editInput').value.trim();
      if (text && editingId) {
        const todo = todos.find(t => t.id === editingId);
        if (todo) {
          todo.text = text;
          todo.updatedAt = new Date().toISOString();
          saveTodos();
          renderTodos();
          showToast('已保存修改');
        }
      }
      closeEdit();
    }

    function closeEdit() {
      editingId = null;
      document.getElementById('editModal').classList.remove('active');
    }

    // ===== Rendering =====
    function renderTodos() {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyState');
      
      let filtered = todos;
      if (currentFilter === 'active') filtered = todos.filter(t => !t.completed);
      if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const categoryNames = {
        general: '一般',
        work: '工作',
        study: '学习',
        life: '生活',
        health: '健康'
      };

      const priorityNames = {
        high: '高',
        medium: '中',
        low: '低'
      };

      list.innerHTML = filtered.map(todo => {
        const date = new Date(todo.createdAt);
        const dateStr = `${date.getMonth()+1}月${date.getDate()}日 ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
        return `
          <li class="todo-item ${todo.completed ? 'completed' : ''}">
            <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')"></div>
            <div class="todo-content">
              <div class="todo-text">${escapeHtml(todo.text)}</div>
              <div class="todo-meta">
                <span class="tag priority-${todo.priority}">优先级：${priorityNames[todo.priority]}</span>
                <span class="tag category">${categoryNames[todo.category]}</span>
                <span class="todo-date">${dateStr}</span>
              </div>
            </div>
            <div class="todo-actions">
              <button class="action-btn" onclick="startEdit('${todo.id}')" title="编辑">✏️</button>
              <button class="action-btn delete" onclick="deleteTodo('${todo.id}')" title="删除">🗑️</button>
            </div>
          </li>
        `;
      }).join('');
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = todos.length;
      document.getElementById('statActive').textContent = todos.filter(t => !t.completed).length;
      document.getElementById('statCompleted').textContent = todos.filter(t => t.completed).length;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== UI Helpers =====
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ===== Event Listeners =====
    document.getElementById('addBtn').addEventListener('click', () => {
      const input = document.getElementById('todoInput');
      const priority = document.getElementById('prioritySelect').value;
      const category = document.getElementById('categorySelect').value;
      addTodo(input.value, priority, category);
      input.value = '';
    });

    document.getElementById('todoInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('addBtn').click();
      }
    });

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderTodos();
      });
    });

    document.getElementById('saveEdit').addEventListener('click', saveEdit);
    document.getElementById('cancelEdit').addEventListener('click', closeEdit);
    document.getElementById('editInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEdit();
    });
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEdit();
    });

    // ===== Init =====
    loadTodos();

    // Periodic cloud sync (pull latest data every 30s)
    setInterval(async () => {
      const binId = localStorage.getItem('jsonbin_bin_id');
      if (binId && !isLoading) {
        try {
          const latest = await readBin(binId);
          // Only update if remote data is different
          const localStr = JSON.stringify(todos);
          const remoteStr = JSON.stringify(latest);
          if (localStr !== remoteStr) {
            todos = latest;
            renderTodos();
            updateStats();
            showToast('已同步最新数据');
          }
        } catch (e) {
          console.log('定时同步失败:', e);
        }
      }
    }, 30000);
  </script>
</body>
</html>
