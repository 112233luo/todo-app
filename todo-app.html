    .app-header::before {

    }

    /* === Filter Tabs === */
    .filter-tabs {

    .todo-list {

    .todo-item {

      border: 1px solid var(--rule);
      border-radius: 4px;
      margin-bottom: 0.75rem;
      transition: all 0.3s;

    .todo-item::before {

    }
    .tag.category {
      background: rgba(139,115,85,0.15);
      color: var(--accent2);
      border-color: rgba(139,115,85,0.3);
    }
    .todo-date {

    /* === Edit Modal === */
    .modal-overlay {
      position: fixed;

      left: 0;
      right: 0;
      bottom: 0;

      display: flex;

      transition: all 0.3s;

    .modal-overlay.active {
      opacity: 1;

    }
    .modal {
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg3) 100%);
      padding: 2rem;
      border: 2px solid var(--rule);
      border-radius: 4px;
      width: 90%;
      max-width: 420px;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);

    .modal-overlay.active .modal {

    .modal::before {

    .modal-input {

      padding: 0.875rem 1rem;

      border-radius: 2px;
      font-size: 1rem;
      font-family: var(--font-body);

    .modal-input:focus {

    .modal-btn {

    .modal-btn.cancel {

    .modal-btn.cancel:hover {

    /* === Toast === */
    .toast {
      position: fixed;

      padding: 0.875rem 2rem;

      border-radius: 2px;

      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;

    /* === Scrollbar === */
    ::-webkit-scrollbar {

      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {

    /* === Responsive === */
    @media (max-width: 480px) {
      body { padding: 0.75rem; }
      .app-header h1 { font-size: 1.4rem; }
      .input-wrapper { flex-direction: column; }
      .add-btn { width: 100%; }
      .todo-item { padding: 1rem; }
      .stats-bar::before, .stats-bar::after { display: none; }
      .character-left, .character-right { display: none; }
    }

    /* === Animated Background === */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Golden particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 6px var(--accent), 0 0 12px rgba(201,168,76,0.3);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.8; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* Rotating gears SVG */
    .gears-container {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      opacity: 0.12;

    .gears-left {
      top: 10%;
      left: -30px;
    }
    .gears-right {
      bottom: 8%;
      right: -30px;
    }
    .gears-top-center {
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
    }
    .gears-bottom-left {
      bottom: 30%;
      left: 5%;
    }
    .gear {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      transform-origin: center;
    }
    .gear-spin-cw {
      animation: spinCW 20s linear infinite;
    }
    .gear-spin-ccw {
      animation: spinCCW 15s linear infinite;
    }
    .gear-spin-slow {
      animation: spinCW 30s linear infinite;
    }
    @keyframes spinCW { to { transform: rotate(360deg); } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }

    /* Floating characters */
    .character-left, .character-right {
      position: fixed;
      bottom: 0;
      width: 180px;
      height: auto;
      opacity: 0.12;
      z-index: 0;
      pointer-events: none;
      filter: sepia(0.3) saturate(0.8) brightness(0.7);
      transition: opacity 0.5s;
    }
    .character-left {
      left: 0;
      animation: floatLeft 8s ease-in-out infinite;
    }
    .character-right {
      right: 0;
      animation: floatRight 10s ease-in-out infinite;
    }
    @keyframes floatLeft {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-20px) translateX(10px); }
    }
    @keyframes floatRight {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-15px) translateX(-10px); }
    }

    /* Background decorative SVG gears (replaces static image) */
    .bg-gears {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
    }
    .bg-gear-group-1 {
      position: absolute;
      top: 20%;
      left: 10%;
    }
    .bg-gear-group-2 {
      position: absolute;
      top: 60%;
      right: 8%;
    }
    .bg-gear-group-3 {
      position: absolute;
      top: 40%;
      left: 55%;
    }
    .bg-gear-group-4 {
      position: absolute;
      bottom: 15%;
      left: 25%;
    }
    .bg-gear-group-5 {

    async function updateBin(data) {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${SHARED_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ todos: data })
      });
      if (!res.ok) throw new Error('保存失败: ' + res.status);
      return await res.json();
    }

    async function loadTodos() {
      isLoading = true;
      showSyncStatus('syncing');
      try {
        const cloudTodos = await readBin();
        todos = cloudTodos;
        localStorage.setItem('my_todo_app_data', JSON.stringify(todos));
        cloudAvailable = true;
        showSyncStatus('synced');
      } catch (e) {
        console.error('云端加载失败:', e);
        const local = localStorage.getItem('my_todo_app_data');
        if (local) { try { todos = JSON.parse(local); } catch (err) { todos = []; } }
        cloudAvailable = false;
        showSyncStatus('offline');
      }
      isLoading = false;
      renderTodos();
      updateStats();
    }

    async function saveTodos() {
      if (isLoading) return;
      localStorage.setItem('my_todo_app_data', JSON.stringify(todos));
      if (cloudAvailable) {
        showSyncStatus('syncing');
        try {
          await updateBin(todos);
          showSyncStatus('synced');
        } catch (e) {
          console.error('云端保存失败:', e);
          cloudAvailable = false;
          showSyncStatus('offline');
        }
      }
      updateStats();
    }

    function showSyncStatus(status) {
      const el = document.getElementById('syncStatus');
      const text = document.getElementById('syncText');
      el.className = 'sync-status ' + status;
      const texts = {
        synced: '已同步到云端',
        syncing: '正在同步...',
        offline: '离线模式'
      };
      text.textContent = texts[status];
    }

    function addTodo(text, priority, category) {
      if (!text.trim()) return;
      const todo = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2),
        text: text.trim(),
        completed: false,
        priority: priority || 'medium',
        category: category || 'general',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      todos.unshift(todo);
      saveTodos();
      renderTodos();
      showToast('已铭刻时间碎片');
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        todo.updatedAt = new Date().toISOString();
        saveTodos();
        renderTodos();
        showToast(todo.completed ? '时间碎片已封印 ✦' : '封印已解除');
      }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      saveTodos();
      renderTodos();
      showToast('时间碎片已消散');
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        editingId = id;
        document.getElementById('editInput').value = todo.text;
        document.getElementById('editModal').classList.add('active');
      }
    }

    function saveEdit() {
      const text = document.getElementById('editInput').value.trim();
      if (text && editingId) {
        const todo = todos.find(t => t.id === editingId);
        if (todo) {
          todo.text = text;
          todo.updatedAt = new Date().toISOString();
          saveTodos();
          renderTodos();
          showToast('时间碎片已重塑');
        }
      }
      closeEdit();
    }

    function closeEdit() {
      editingId = null;
      document.getElementById('editModal').classList.remove('active');
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyState');
      let filtered = todos;
      if (currentFilter === 'active') filtered = todos.filter(t => !t.completed);
      if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const categoryNames = {
        general: '一般', work: '工作', study: '学习', life: '生活', health: '健康'
      };
      const priorityNames = { high: '高', medium: '中', low: '低' };

      list.innerHTML = filtered.map(todo => {
        const date = new Date(todo.createdAt);
        const dateStr = `${date.getMonth()+1}月${date.getDate()}日 ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
        return `
          <li class="todo-item ${todo.completed ? 'completed' : ''}">
            <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')"></div>
            <div class="todo-content">
              <div class="todo-text">${escapeHtml(todo.text)}</div>
              <div class="todo-meta">
                <span class="tag priority-${todo.priority}">${priorityNames[todo.priority]}</span>
                <span class="tag category">${categoryNames[todo.category]}</span>
                <span class="todo-date">${dateStr}</span>
              </div>
            </div>
            <div class="todo-actions">
              <button class="action-btn" onclick="startEdit('${todo.id}')" title="编辑">✦</button>
              <button class="action-btn delete" onclick="deleteTodo('${todo.id}')" title="删除">✕</button>
            </div>
          </li>
        `;
      }).join('');
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = todos.length;
      document.getElementById('statActive').textContent = todos.filter(t => !t.completed).length;
      document.getElementById('statCompleted').textContent = todos.filter(t => t.completed).length;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const input = document.getElementById('todoInput');
      const priority = document.getElementById('prioritySelect').value;
      const category = document.getElementById('categorySelect').value;
      addTodo(input.value, priority, category);
      input.value = '';
    });

    document.getElementById('todoInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderTodos();
      });
    });

    document.getElementById('saveEdit').addEventListener('click', saveEdit);
    document.getElementById('cancelEdit').addEventListener('click', closeEdit);
    document.getElementById('editInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEdit();
    });
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEdit();
    });

    loadTodos();

    // Generate golden particles
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 15) + 's';
        p.style.width = (2 + Math.random() * 3) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
      }
    })();

    setInterval(async () => {
      if (!isLoading && cloudAvailable) {
        try {
          const latest = await readBin();
          if (JSON.stringify(todos) !== JSON.stringify(latest)) {
            todos = latest;
            renderTodos();
            updateStats();
          }
        } catch (e) { console.log('定时同步失败:', e); }
      }
    }, 30000);
  </script>
</body>
</html>
